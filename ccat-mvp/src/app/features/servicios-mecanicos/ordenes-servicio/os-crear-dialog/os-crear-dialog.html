<h2 mat-dialog-title>Nueva Orden de Servicio</h2>

<mat-dialog-content>
  <div class="error" *ngIf="(errorMsg$ | async) as err">{{ err }}</div>

  <form [formGroup]="form" class="grid">
    <mat-form-field appearance="outline">
      <mat-label>Cliente</mat-label>
      <mat-select formControlName="idCliente">
        <mat-option *ngFor="let c of clientes" [value]="c.idCliente">
          {{ c.numeroDocumento || '-' }} - {{ c.razonSocial }}
        </mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Placa</mat-label>
      <input matInput formControlName="placa" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Marca</mat-label>
      <input matInput formControlName="marca" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Modelo</mat-label>
      <input matInput formControlName="modelo" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Kilometraje</mat-label>
      <input matInput type="number" formControlName="kilometraje" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Observación</mat-label>
      <input matInput formControlName="observacion" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Usuario</mat-label>
      <input matInput formControlName="usuario" />
    </mat-form-field>

    <div class="hint" *ngIf="clientes.length===0">
      No hay clientes registrados. Crea uno en el módulo <b>Clientes</b>.
    </div>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-stroked-button (click)="cerrar()" [disabled]="loading">Cancelar</button>
  <button mat-flat-button color="primary" (click)="guardar()" [disabled]="loading">
    <mat-progress-spinner *ngIf="loading" diameter="18" mode="indeterminate"></mat-progress-spinner>
    <span *ngIf="!loading">Crear</span>
  </button>
</mat-dialog-actions>
