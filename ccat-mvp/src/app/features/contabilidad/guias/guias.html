<div class="page-head">
  <div>
    <h1>Contabilidad · Guías</h1>
    <p>Emisión y consulta de guías</p>
  </div>

  <div class="actions">
    <button mat-flat-button color="primary" class="btn-primary btn-main" (click)="emitir()" [disabled]="loading">
      <mat-icon>add</mat-icon>
      Emitir guía
    </button>
  </div>
</div>

<div class="kpis">
  <mat-card class="kpi">
    <div class="kpi-title">Emitidas</div>
    <div class="kpi-value">{{ emitidas }}</div>
  </mat-card>

  <mat-card class="kpi">
    <div class="kpi-title">Anuladas</div>
    <div class="kpi-value">{{ anuladas }}</div>
  </mat-card>

  <mat-card class="kpi">
    <div class="kpi-title">Total</div>
    <div class="kpi-value">{{ dataSource.length }}</div>
  </mat-card>
</div>

<mat-card class="card">
  <div class="toolbar">
    <mat-form-field appearance="outline" class="search">
      <mat-label>Buscar</mat-label>
      <input matInput placeholder="N° guía, motivo..." [formControl]="form.controls.q" (keyup.enter)="cargar()" />
      <button mat-icon-button matSuffix type="button" (click)="cargar()" aria-label="Buscar">
        <mat-icon>search</mat-icon>
      </button>
    </mat-form-field>

    <div class="toolbar-actions">
      <button mat-stroked-button class="btn-outline btn-small" (click)="limpiar()" [disabled]="loading">Limpiar</button>
      <button mat-flat-button color="primary" class="btn-primary btn-small" (click)="cargar()" [disabled]="loading">
        <mat-icon>refresh</mat-icon>
        Actualizar
      </button>
    </div>
  </div>

  <div class="state" *ngIf="loading">
    <mat-progress-spinner diameter="22" mode="indeterminate"></mat-progress-spinner>
    <span>Cargando...</span>
  </div>

  <div class="error" *ngIf="!loading && errorMsg">{{ errorMsg }}</div>

  <mat-divider></mat-divider>

  <div class="table-wrap" *ngIf="!loading">
    <table mat-table [dataSource]="dataSource" class="mat-elevation-z0 table guias-table">

      <ng-container matColumnDef="numero">
        <th mat-header-cell *matHeaderCellDef>N°</th>
        <td mat-cell *matCellDef="let g"><b>{{ g.numero }}</b></td>
      </ng-container>

      <ng-container matColumnDef="tipo">
        <th mat-header-cell *matHeaderCellDef>Tipo</th>
        <td mat-cell *matCellDef="let g">{{ g.tipo || '-' }}</td>
      </ng-container>

      <ng-container matColumnDef="fecha">
        <th mat-header-cell *matHeaderCellDef>Fecha</th>
        <td mat-cell *matCellDef="let g">{{ g.fecha | date:'yyyy-MM-dd' }}</td>
      </ng-container>

      <ng-container matColumnDef="estado">
        <th mat-header-cell *matHeaderCellDef>Estado</th>
        <td mat-cell *matCellDef="let g">
          <mat-chip class="chip" [ngClass]="chipClass(g.estado)">
            {{ g.estado }}
          </mat-chip>
        </td>
      </ng-container>

      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let g" class="col-acciones">
          <div class="acciones-wrap">
            <!-- <button mat-icon-button class="accion-btn accion-btn--view" (click)="ver(g)" matTooltip="Ver detalle" aria-label="Ver detalle">
              <mat-icon>visibility</mat-icon>
            </button> -->

            <!-- <button
              mat-icon-button
              class="accion-btn accion-btn--delete"
              (click)="anular(g)"
              [disabled]="(g.estado || '').toUpperCase() === 'ANULADA'"
              matTooltip="Eliminar"
              aria-label="Eliminar">
              <mat-icon>delete</mat-icon>
            </button> -->
          </div>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <div class="empty" *ngIf="!errorMsg && dataSource.length === 0">
      No hay guías para mostrar.
    </div>
  </div>
</mat-card>
