<div class="login-page">
  <mat-card class="login-card">
    <img class="login-logo" src="/logo-ccat.png" alt="CCAT Perú" />
    <h1 class="title">CCAT Perú</h1>
    <p class="subtitle">Sistema de Gestión</p>
    <form [formGroup]="form" (ngSubmit)="login()">
      <mat-form-field appearance="outline" class="full">
        <mat-label>Usuario</mat-label>
        <input matInput formControlName="username" autocomplete="username" />
        <mat-icon matSuffix>person</mat-icon>
      </mat-form-field>
      <mat-form-field appearance="outline" class="full">
        <mat-label>Contraseña</mat-label>
        <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password" autocomplete="current-password" />
        <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword">
          <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
      </mat-form-field>
      <button mat-raised-button color="primary" class="full login-btn" type="submit" [disabled]="loading">
        {{ loading ? 'Ingresando...' : 'Ingresar' }}
      </button>
      <div class="error" *ngIf="errorMsg">{{ errorMsg }}</div>
    </form>
    <div class="footer"><span>CCAT Perú © 2026</span></div>
  </mat-card>
</div>
