<h2 mat-dialog-title>{{ data ? 'Editar vehículo' : 'Nuevo vehículo' }}</h2>

<mat-dialog-content>
  <form [formGroup]="form" class="form">
    <div class="grid">
      <mat-form-field appearance="outline">
        <mat-label>VIN (código)</mat-label>
        <input matInput formControlName="vin" placeholder="Opcional" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Marca</mat-label>
        <input matInput formControlName="marca" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Modelo</mat-label>
        <input matInput formControlName="modelo" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Año</mat-label>
        <input matInput type="number" formControlName="anio" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Color</mat-label>
        <input matInput formControlName="color" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Precio lista</mat-label>
        <input matInput type="number" formControlName="precioLista" />
      </mat-form-field>

      <mat-slide-toggle formControlName="activo">Activo</mat-slide-toggle>

      <mat-form-field appearance="outline">
        <mat-label>Usuario</mat-label>
        <input matInput formControlName="usuario" />
      </mat-form-field>
    </div>

    <div class="error" *ngIf="errorMsg">{{ errorMsg }}</div>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-stroked-button (click)="cerrar()" [disabled]="loading">Cancelar</button>
  <button mat-raised-button color="primary" (click)="guardar()" [disabled]="loading">
    <mat-progress-spinner *ngIf="loading" diameter="18" mode="indeterminate"></mat-progress-spinner>
    <span *ngIf="!loading">Guardar</span>
  </button>
</mat-dialog-actions>
