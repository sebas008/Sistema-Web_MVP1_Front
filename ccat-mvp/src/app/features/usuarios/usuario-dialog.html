<h2 mat-dialog-title>{{ data ? 'Editar usuario' : 'Nuevo usuario' }}</h2>

<div mat-dialog-content>
  <div class="error" *ngIf="errorMsg">{{ errorMsg }}</div>

  <div class="grid">
    <mat-form-field appearance="outline">
      <mat-label>Usuario</mat-label>
      <input matInput [formControl]="form.controls.username" />
    </mat-form-field>

    <mat-form-field appearance="outline" *ngIf="!data">
      <mat-label>Password</mat-label>
      <input matInput type="password" [formControl]="form.controls.password" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Nombres</mat-label>
      <input matInput [formControl]="form.controls.nombres" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Apellidos</mat-label>
      <input matInput [formControl]="form.controls.apellidos" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Email</mat-label>
      <input matInput [formControl]="form.controls.email" />
    </mat-form-field>

    <mat-form-field appearance="outline" *ngIf="!data">
      <mat-label>Rol</mat-label>
      <mat-select [formControl]="form.controls.rolNombre">
        <mat-option value="">(Sin rol)</mat-option>
        <mat-option *ngFor="let r of roles" [value]="r.nombre">{{ r.nombre }}</mat-option>
      </mat-select>
    </mat-form-field>
  </div>
</div>

<div mat-dialog-actions align="end">
  <button mat-stroked-button type="button" (click)="cerrar()" [disabled]="loading">Cancelar</button>
  <button mat-flat-button color="primary" type="button" (click)="guardar()" [disabled]="loading">
    <mat-progress-spinner *ngIf="loading" diameter="18" mode="indeterminate"></mat-progress-spinner>
    <span *ngIf="!loading">Guardar</span>
  </button>
</div>
