<div class="head">
  <div>
    <h1>Dashboard</h1>
    <p>Resumen general del sistema.</p>
  </div>

  <div class="actions">
    <button
      mat-stroked-button
      type="button"
      class="kpi-action"
      (click)="cargar()"
      [attr.aria-busy]="loading"
      [class.is-loading]="loading"
      aria-label="Actualizar KPI's"
    >
      <mat-icon>{{ loading ? 'hourglass_top' : 'refresh' }}</mat-icon>
      {{ loading ? "Actualizando..." : "Ver KPI's" }}
    </button>
  </div>
</div>

<div class="kpis">
  <mat-card class="kpi" *ngFor="let k of kpis">
    <div class="kpi-icon">
      <mat-icon>{{ k.icon }}</mat-icon>
    </div>
    <div class="kpi-body">
      <div class="kpi-title">{{ k.title }}</div>
      <div class="kpi-value">{{ k.value }}</div>
    </div>
  </mat-card>
</div>

<section class="quick-panel">
  <mat-card class="panel">
    <div class="panel-head">
      <div>
        <h3>Accesos rápidos</h3>
        <span>Ir directo a los módulos principales</span>
      </div>
    </div>

    <div class="quick">
      <button mat-stroked-button routerLink="/app/usuarios">
        <mat-icon>group</mat-icon>
        Usuarios
      </button>
      <button mat-stroked-button routerLink="/app/inventario">
        <mat-icon>inventory_2</mat-icon>
        Inventario
      </button>
      <button mat-stroked-button routerLink="/app/vehiculos-nuevos">
        <mat-icon>directions_car</mat-icon>
        Vehículos
      </button>
      <button mat-stroked-button routerLink="/app/contabilidad/facturacion">
        <mat-icon>receipt_long</mat-icon>
        Facturación
      </button>
    </div>
  </mat-card>
</section>
