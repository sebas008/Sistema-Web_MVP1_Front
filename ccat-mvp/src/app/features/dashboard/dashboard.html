<div class="head">
  <div>
    <h1>Dashboard</h1>
    <p>Resumen general del sistema.</p>
  </div>
  <div class="actions">
    <button mat-stroked-button type="button" class="kpi-action" (click)="cargar()" [attr.aria-busy]="loading" [class.is-loading]="loading">
      <mat-icon>{{ loading ? 'hourglass_top' : 'refresh' }}</mat-icon>
      {{ loading ? 'Actualizando...' : 'Actualizar' }}
    </button>
  </div>
</div>
<div class="kpis">
  <mat-card class="kpi" *ngFor="let k of kpis">
    <div class="kpi-icon"><mat-icon>{{ k.icon }}</mat-icon></div>
    <div class="kpi-body"><div class="kpi-title">{{ k.title }}</div><div class="kpi-value">{{ k.value }}</div></div>
  </mat-card>
</div>
<section class="quick-panel">
  <mat-card class="panel">
    <div class="panel-head"><div><h3>Accesos rápidos</h3><span>Ir directo a los módulos principales</span></div></div>
    <div class="quick">
      <button *ngFor="let item of quickLinks" mat-stroked-button [routerLink]="item.route" [hidden]="!can(item.module)">
        <mat-icon>{{ item.icon }}</mat-icon>{{ item.label }}
      </button>
    </div>
  </mat-card>
</section>
